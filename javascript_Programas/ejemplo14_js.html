<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ejemplo 14 de JAVASCRIPT</title>
</head>
<body>
    <!--Las variables se utilizan para almacenar valores de datos.
    JavaScript usa las palabras clave var y let para declarar variables.-->

    <h2>¿Cómo se declaran las variables en JavaScript?</h2>
    <p>Las declaraciones de JavaScript están separadas por punto y coma</p>
    <p id="demo1"></p>
    <script>
        //JavaScript ignora varios espacios. Puede agregar espacios en blanco a
        //su secuencia de comandos para que seamás legible.

        let a, b, c; //Declaración de tres variables
        a=7; //Asigna el valor 7 a la variable a
        b=8; //Asigna el valor 8 a la variable b
        c=a+b; //Asigna la suma de a y b a la variable c

        document.getElementById("demo1").innerHTML = c;
    </script>
</body>
</html>
