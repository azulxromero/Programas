<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Foco Apagado y Encendido</title>
</head>
<body>
    <h2>¿Qué puede hacer JAVASCRIPT?</h2>
    <p>En este caso, JavaScript cambia el valor del atributo src (fuente) de una imagen.</p>
    <button onclick="document.getElementById('myImagen').src='img/focoapagado2.png'"style="width: 200px;">APAGAR LA LUZ</button>
    <img id="myImagen" src="img/focoencendido.png">
     <button onclick="document.getElementById('myImagen').src='img/focoencendido.png'"style="width: 200px;">PRENDER LA LUZ</button>
    
    

</body>
</html>
