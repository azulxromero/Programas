<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ejemplos de JAVASCRIPT</title>
    <script>
        function ejemplosFunction(){
        document.getElementById("demo").innerHTML = "He cambiado el párrafo, llamando a la función."
        }
    </script>
</head>
<body>
    <!--En este ejemplo, se coloca un JavaScript en la <head> sección de una página HTML.
        La función se invoca (llama) cuando se hace clic en un botón-->
    <!--Funciones y eventos de JavaScript es un bloque de código que se puede ejecutar cuando es "llamada.
        Se puede llamar a una función cuando ocurre un evento, como cuando el usuario hace
        clic en un botón."-->
    <h2>Ejemplos JavaScript en la cabecera head</h2>
    <p id="demo">Un párrafo cualquiera.</p>
    <button type="button" onclick="ejemplosFunction()">Compruébalo tú mismo</button>
</body>
</html>
